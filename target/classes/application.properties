# ============================================================
# INFOH303 - Configuration de l'application Spring Boot
# ============================================================

spring.application.name=projetbdd

# ===== Serveur =====
server.port=8080

# ===== Base de donnees MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/projetbdd?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=projetbdd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# 'none' : on utilise schema.sql pour creer les tables (controle total)
# 'update' : Hibernate met a jour le schema (utile en developpement)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Initialisation SQL =====
# schema.sql cree les tables + triggers. Les DONNEES sont desormais
# importees par DataInitializer (lecture des fichiers CSV/XML/JSON).
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.data-locations=
# Pour qu'on puisse re-executer schema.sql proprement
spring.sql.init.continue-on-error=false

# ===== Logging =====
logging.level.org.springframework.web=INFO
logging.level.com.cwa.projetbdd=DEBUG
logging.level.org.hibernate.SQL=WARN

# ===== Jackson (JSON) =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
